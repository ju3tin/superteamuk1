
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Luma Events</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .events {
      display: grid;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .event {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .event img {
      width: 100%;
      border-radius: 8px;
    }

    .event h2 {
      margin: 10px 0;
    }

    .event a {
      display: inline-block;
      margin-top: 10px;
      color: blue;
    }
  </style>
</head>
<body>

  <h1>Luma Events</h1>
  <div id="events" class="events"></div>

  <script>
    const API_URL = "https://byihkeitthikkbhfwwlg.supabase.co/functions/v1/luma-events";

    async function loadEvents() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const eventsContainer = document.getElementById("events");

        if (!data.events || data.events.length === 0) {
          eventsContainer.innerHTML = "<p>No events found.</p>";
          return;
        }

        data.events.forEach(event => {
          const div = document.createElement("div");
          div.className = "event";

          div.innerHTML = `
            <img src="${event.cover_url}" alt="${event.name}" />
            <h2>${event.name}</h2>
            <p>📍 ${event.location.address}, ${event.location.city}</p>
            <p>🕒 ${new Date(event.start_at).toLocaleString()}</p>
            <p>${event.description.slice(0, 150)}...</p>
            <a href="${event.url}" target="_blank">View Event →</a>
          `;

          eventsContainer.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("events").innerHTML =
          "<p>Error loading events.</p>";
      }
    }

    loadEvents();
  </script>

</body>
</html>
